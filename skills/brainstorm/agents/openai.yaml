interface:
  display_name: "Brainstorm"
  short_description: "Clarify VibeRig requirements one approved phase at a time"
  default_prompt: "Brainstorm a VibeRig requirement from an idea, name, or research topic. Work one phase at a time across requirement, research, acceptance, roadmap, and spec; research may happen before requirement, after requirement, both, or be skipped when current context is sufficient. When research happens before requirement, use its assumptions to create requirement.md next, then recommend an optional research refresh after requirement approval without making it mandatory. For each phase and review block, run the 3W1H workflow: scope the block, build the Why/What/Who/How map, classify blocking gaps, ask one clarifying question at a time, compare options across 3W1H when needed, confirm each draft block through 3W1H, then write only the approved .vibeRig document(s) with no TBD, open questions, or unresolved blockers. Keep requirement and research concise for humans, write both acceptance.md and acceptance-human.md with matching IDs/order, start roadmap and spec with human summaries, self-review the written file(s), ask the user to inspect them, and recommend the next phase."
